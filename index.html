function addMinutes(hora, mins) {
  if(!hora || !/^\d{2}:\d{2}$/.test(hora)) return '';
  const [h,m]=hora.split(':').map(Number);
  let total=h*60+m+mins;
  if(total<0) total+=24*60;
  if(total>=24*60) total-=24*60;
  const nh=Math.floor(total/60)%24, nm=total%60;
  return String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
}

    const m=notas.match(re);
    if(m){ const v=m[1].trim(); if(v) return v; }
  }
  return '';
}

    } else if(!puebloDetectado) {
      calleParts.push(part);
    }
  }
  // Si no se detectó CP, usar última parte como pueblo (si hay más de una)
  if(!puebloDetectado && calleParts.length > 1) {
    puebloDetectado = calleParts.pop();
  }
  const calle = calleParts.join(', ').trim();
  const puebloFinal = puebloDetectado || pueblo || '';
  return { calle, pueblo: puebloFinal };
}
function getLekua(e) {
  const loc = e.location || '';
  const { calle, pueblo } = extractCalleYPueblo(loc, e.pueblo||'');
  const provincia = extractProvincia(loc);
  const puebloConProv = provincia ? `${pueblo} (${provincia})` : pueblo;
  if(calle && puebloConProv) return `${calle}, ${puebloConProv}`;
  if(calle) return calle;
  if(puebloConProv) return puebloConProv;
  return 'Por confirmar';
}

function getProvinciaEv(e) {
  const fromLoc = extractProvincia(e.location || '');
  if(fromLoc) return fromLoc;
  const pueblo = normalize(e.pueblo || '');
  if(!pueblo) return '';
  for(const key of Object.keys(PUEBLO_PROV)) {
    if(pueblo.includes(key)) return PUEBLO_PROV[key];
  }
  return '';
}
function getDuracionMin(e) {
  if(!e.hora_inicio || !e.hora_final) return null;
  if(e.hora_inicio === '00:00' && e.hora_final === '00:00') return null;
  const [h1,m1] = (e.hora_inicio||'').split(':').map(Number);
  const [h2,m2] = (e.hora_final||'').split(':').map(Number);
  if(isNaN(h1)||isNaN(h2)||isNaN(m1)||isNaN(m2)) return null;
  let total = (h2*60+m2) - (h1*60+m1);
  if(total <= 0) total += 24*60;
  return total;
}
function getTarifaKey(durMin) {
  if(durMin == null) return null;
  if(durMin >= 75 && durMin <= 105) return 90;
  if(durMin >= 110 && durMin <= 135) return 120;
  return null;
}
// Retorna null, o { precio, provincia, tarifaKey, rango? }
function getPrecio(e, nombre) {
  if(!nombre) return null;
  const key = normalize(nombre);
  const pricing = PRECIOS[key];
  if(!pricing) return null;
  const dur = getDuracionMin(e);
  const tKey = getTarifaKey(dur);
  if(!tKey) return null;
  const rates = pricing[tKey];
  if(!rates) return null;
  if('any' in rates) return { precio: rates.any, provincia: '', tarifaKey: tKey, rango:false };
  const prov = getProvinciaEv(e);
  if(prov) {
    const p = rates[prov.toLowerCase()];
    if(p != null) return { precio: p, provincia: prov, tarifaKey: tKey, rango:false };
  }
  // Provincia desconocida para Mitxel/Jon: devolver rango min-max
  const vals = Object.values(rates);
  return { precio: null, precioMin: Math.min(...vals), precioMax: Math.max(...vals), provincia: '?', tarifaKey: tKey, rango:true };
}
// Devuelve el nombre activo del filtro de persona con tarifa (o '')
function getPersonaConTarifa() {
  const fa = ($('fAnimador').value||'').trim();
  const fd = ($('fDJ').value||'').trim();
  const cand = fa || fd;
  if(!cand) return '';
  return PRECIOS[normalize(cand)] ? cand : '';
}
function formatTarifa(tKey) { return tKey===90 ? '1h30' : (tKey===120 ? '2h' : ''); }

function limpiarFiltros() { $('fAnimador').value=''; $('fDJ').value=''; $('fPueblo').value=''; $('fDesde').value=hoyISO(); $('fHasta').value=''; $('fTexto').value=''; applyFilters(); }
function escapeHtml(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renderResults() {
  const cont=$('results'); $('resultCount').textContent=CURRENT_RESULTS.length;
  const persona = getPersonaConTarifa();
  // Totales
  let totalExacto = 0, totalRangoMin = 0, totalRangoMax = 0, conPrecio = 0, sinProv = 0, sinTarifa = 0;
  const precios = CURRENT_RESULTS.map(e => persona ? getPrecio(e, persona) : null);
  precios.forEach(p => {
    if(!p) { sinTarifa++; return; }
    conPrecio++;
    if(p.rango) { totalRangoMin += p.precioMin; totalRangoMax += p.precioMax; sinProv++; }
    else { totalExacto += p.precio; totalRangoMin += p.precio; totalRangoMax += p.precio; }
  });
  const ptEl = $('precioTotal');
  if(persona && conPrecio > 0) {
    ptEl.style.display = 'flex';
    $('pTPersona').textContent = '— ' + persona;
    const valor = (totalRangoMin === totalRangoMax)
      ? `${totalRangoMin} €`
      : `${totalRangoMin}–${totalRangoMax} €`;
    $('pTValor').textContent = valor;
    const partes = [`${conPrecio} disko${conPrecio===1?'':'s'} con tarifa`];
    if(sinTarifa) partes.push(`${sinTarifa} sin tarifa aplicable (duración ≠ 1h30/2h)`);
    if(sinProv) partes.push(`${sinProv} con provincia desconocida → rango`);
    $('pTDetalle').textContent = partes.join(' · ');
  } else {
    ptEl.style.display = 'none';
  }
  if(!CURRENT_RESULTS.length){ cont.innerHTML='<div class="empty"><div class="icon">🔍</div><p>Sin resultados con estos filtros</p></div>'; return; }
  cont.innerHTML=CURRENT_RESULTS.map((e,idx)=>{
    const anims=animadoresDe(e), djs=djsDe(e);
    const chipsAnim=anims.map(a=>`<span class="chip">👤 ${escapeHtml(a)}</span>`).join('');
    const chipsDj=djs.map(d=>`<span class="chip dj">🎧 ${escapeHtml(d)}</span>`).join('');
    const mapsQuery = encodeURIComponent(e.location || e.pueblo || '');
    const mapsUrl = mapsQuery ? `https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}` : '';
    const mapsLabel = e.location ? escapeHtml(e.location) : escapeHtml(e.pueblo || '');
    const chipLugar = mapsUrl ? `<a class="chip lugar" href="${mapsUrl}" target="_blank" rel="noopener" style="text-decoration:none;cursor:pointer;">📍 ${mapsLabel} 🗺️</a>` : '';
    let chipPrecio = '';
    const p = precios[idx];
    if(p) {
      const tarifa = formatTarifa(p.tarifaKey);
      if(p.rango) {
        chipPrecio = `<span class="chip precio noprov" title="Provincia desconocida">💶 ${p.precioMin}–${p.precioMax}€ · ${tarifa} · prov.?</span>`;
      } else {
        const provTxt = p.provincia ? ` · ${p.provincia}` : '';
        chipPrecio = `<span class="chip precio">💶 ${p.precio}€ · ${tarifa}${provTxt}</span>`;
      }
    }
    const horaInicio = e.hora_inicio || '';
    const horaFinal  = e.hora_final  || '';
    const notas = e.notas ? e.notas.replace(/\[Original:.*?\]/g,'').replace(/Ubicacion:[^|]*/g,'').replace(/\|\s*\|/g,'|').replace(/^\s*\|\s*|\s*\|\s*$/g,'').trim() : '';
    const notasHtml = notas ? `<div class="notas-visible">📝 ${escapeHtml(notas)}</div>` : '';
    return `<div class="event-card" data-idx="${idx}">
      <div class="date-row">
        <span class="fecha">📅 ${formatFecha(e.fecha)}</span>
        <span class="hora">🕐 ${horaInicio}${horaFinal ? ' – ' + horaFinal : ''}</span>
      </div>
      <div class="pueblo">🏘️ ${escapeHtml(e.pueblo||'(sin pueblo)')}</div>
      <div class="people">${chipsAnim}${chipsDj}${chipPrecio}${chipLugar}</div>
      ${notasHtml}
    </div>`;
  }).join('');
  cont.querySelectorAll('.event-card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('expanded')));
}
const SHORT_URL_CACHE = new Map();
async function shortenUrl(longUrl) {
  if(!longUrl) return longUrl;
  if(SHORT_URL_CACHE.has(longUrl)) return SHORT_URL_CACHE.get(longUrl);
  try {
    const r = await fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(longUrl), {signal: AbortSignal.timeout(4000)});
    if(r.ok){ const short = (await r.text()).trim(); if(short.startsWith('http')){ SHORT_URL_CACHE.set(longUrl, short); return short; } }
  } catch(e){}
  return longUrl;
}

async function shareResults() {
  const fa = $('fAnimador').value.trim();
  const fd = $('fDJ').value.trim();
  const fp = $('fPueblo').value.trim();
  const fD = $('fDesde').value;
  const fH = $('fHasta').value;
  const fT = $('fTexto').value.trim();

  const n = CURRENT_RESULTS.length;
  if(!n){ alert('No hay resultados para compartir.'); return; }

  let filtrosDesc = [];
  if(fa) filtrosDesc.push('Animador: ' + fa);
  if(fd) filtrosDesc.push('DJ: ' + fd);
  if(fp) filtrosDesc.push('Bezeroa: ' + fp);
  if(fD) filtrosDesc.push('Desde: ' + fD);
  if(fH) filtrosDesc.push('Hasta: ' + fH);
  if(fT) filtrosDesc.push('Texto: ' + fT);

  // Modo DETALLADO: cuando hay Bezeroa seleccionado, se incluye info completa
  // por evento (lugar, fecha, hora inicio/final, hora montaje, matricula,
  // kontaktua, aparkatzeko, notas, precio).
  const modoDetalle = !!fp;

  let lines = ['\uD83C\uDF89 *Diskofestas - Arima Cool Tour*'];
  if(filtrosDesc.length) lines.push('Filtros: ' + filtrosDesc.join(' | '));
  lines.push(n + ' evento' + (n===1?'':'s') + ':');

  const persona = getPersonaConTarifa();

  CURRENT_RESULTS.forEach(function(e, idx) {
    const anims = animadoresDe(e).join(' + ') || '';
    const djs   = djsDe(e).join(' + ') || '';
    if(modoDetalle) {
      lines.push('');
      lines.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
      lines.push('\uD83D\uDCC5 *' + formatFechaCorta(e.fecha) + '*' + (e.pueblo ? ' \u2022 ' + e.pueblo : ''));
      const hi = e.hora_inicio || '';
      const hf = e.hora_final  || '';
      if(hi || hf) {
        let hLine = '\uD83D\uDD50 Ordutegia: ';
        if(hi && hf) hLine += hi + ' \u2013 ' + hf;
        else hLine += (hi || hf);
        lines.push(hLine);
      }
      if(hi) {
        const montaje = addMinutes(hi, -90);
        if(montaje) lines.push('\uD83D\uDEE0\uFE0F Muntaia: ' + montaje + ' (ordu eta erdi lehenago)');
      }
      const lekua = getLekua(e);
      if(lekua && lekua !== 'Por confirmar') lines.push('\uD83D\uDCCD Lekua: ' + lekua);
      else if(e.location) lines.push('\uD83D\uDCCD Lekua: ' + e.location);
      if(anims) lines.push('\uD83D\uDC64 Animatzailea: ' + anims);
      if(djs)   lines.push('\uD83C\uDFA7 DJ: ' + djs);
      if(persona) {
        const p = getPrecio(e, persona);
        if(p) {
          if(p.rango) lines.push('\uD83D\uDCB6 Prezioa: ' + p.precioMin + '\u2013' + p.precioMax + '\u20AC (' + formatTarifa(p.tarifaKey) + ', prov.?)');
          else        lines.push('\uD83D\uDCB6 Prezioa: ' + p.precio + '\u20AC (' + formatTarifa(p.tarifaKey) + (p.provincia?(', '+p.provincia):'') + ')');
        }
      }
      lines.push('\uD83D\uDE90 Furgoneta: ' + getAparkatzeko(e));
      lines.push('\uD83D\uDCDE Kontaktua: ' + getKontaktua(e));
      const notasLimpias = e.notas ? e.notas.replace(/\[Original:.*?\]/g,'').replace(/Ubicacion:[^|]*/g,'').replace(/\|\s*\|/g,'|').replace(/^\s*\|\s*|\s*\|\s*$/g,'').trim() : '';
      if(notasLimpias) lines.push('\uD83D\uDCDD Oharrak: ' + notasLimpias);
    } else {
      let line = '\uD83D\uDCC5 ' + formatFechaCorta(e.fecha) + ' ' + (e.hora_inicio||'') + ' \uD83C\uDFF8\uFE0F ' + (e.pueblo||'');
      if(anims) line += ' \uD83D\uDC64 ' + anims;
      if(djs)   line += ' \uD83C\uDFA7 ' + djs;
      lines.push(line);
    }
  });

  const msg = lines.join('\n');
  const waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(waUrl, '_blank');
}

function init() {
  // Fecha de hoy en el header
  const hoy = new Date();
  const dias = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  document.getElementById('fechaHoy').textContent = dias[hoy.getDay()] + ' ' + hoy.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
  document.getElementById('totalEvents').textContent = EVENTS_DATA.length;
  document.getElementById('lastUpdate').textContent = GENERATED_AT;

  // Filtro "Desde hoy" por defecto
  document.getElementById('fDesde').value = hoyISO();

  // Poblar selects
  populateSelects();

  // Aplicar filtros iniciales
  applyFilters();

  // Botones de filtro
  document.getElementById('btnAplicar').addEventListener('click', applyFilters);
  document.getElementById('btnLimpiar').addEventListener('click', limpiarFiltros);

  // Filtrado en tiempo real al cambiar selects e inputs
  document.getElementById('fAnimador').addEventListener('change', applyFilters);
  document.getElementById('fDJ').addEventListener('change', applyFilters);
  document.getElementById('fPueblo').addEventListener('change', applyFilters);
  document.getElementById('fDesde').addEventListener('change', applyFilters);
  document.getElementById('fHasta').addEventListener('change', applyFilters);
  document.getElementById('fTexto').addEventListener('input', applyFilters);

  // Toggle filtros
  document.getElementById('btnToggleFilters').addEventListener('click', function() {
    const body = document.getElementById('filtersBody');
    const collapsed = body.classList.toggle('collapsed');
    this.textContent = collapsed ? '\u25BC' : '\u25B2';
  });

  // Boton compartir WhatsApp
  document.getElementById('btnShare').addEventListener('click', shareResults);

  // PWA install
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('visible');
  });
  document.getElementById('btnInstall').addEventListener('click', async function() {
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if(result.outcome === 'accepted') document.getElementById('installBanner').classList.remove('visible');
    deferredPrompt = null;
  });
}

document.addEventListener('DOMContentLoaded', init);
